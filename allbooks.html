<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Browse and manage your entire book collection. Track reading progress, save notes, and organize your library.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <title>My Book Collection | Library Manager</title>
</head>

<body>
    <header class="page-header">
        <div class="container-xl py-4">
            <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
                <a href="index.html" class="brand-link">
                    <span class="brand-icon">📖</span>
                    <span class="brand-name">Azaad</span>
                </a>
                <nav class="nav-links d-none d-md-flex align-items-center gap-4">
                    <a href="index.html" class="nav-item">Home</a>
                    <a href="allbooks.html" class="nav-item active">My Books</a>
                    <a href="readingrecord.html" class="nav-item">Progress</a>
                    <a href="addnewbook.html" class="nav-item">Notes</a>
                    <a href="stats.html" class="nav-item">Stats</a>
                </nav>
                <div class="search-shell ms-auto ms-md-0">
                    <input id="search-input" class="search-input" type="search" placeholder="Search books, notes...">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
        </div>
    </header>
    <main class="page-shell">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">All Books</li>
        </ol>
    </nav>

    <section class="page-section bookShowCase">
        <section class="book-list-section">
            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1>All Books in Your Library</h1>
                        <p class="text-muted">Here's your complete book collection. See at a glance what you've read, what's in progress, and what's next. Click any book to view or edit notes and highlights.</p>
                    </div>
                    <a href="index.html" class="btn btn-outline-primary">Home</a>
                </div>
                <div class="row" id="book-list">
                    <!-- Books will be dynamically added here -->
                </div>
            </div>
        </section>
    </section>
    </main>

    <script src="./js/allbooks.js"></script>
    <!-- <script src="./js/addnewbook.js"></script> -->
</body>

</html>
