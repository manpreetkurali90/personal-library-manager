<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Azaad Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HTML -->

    <header class="page-header">
        <div class="container-xl py-4">
            <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
                <a href="index.html" class="brand-link">
                    <span class="brand-icon">📖</span>
                    <span class="brand-name">Azaad</span>
                </a>
                <nav class="nav-links d-none d-md-flex align-items-center gap-4">
                    <a href="index.html" class="nav-item">Home</a>
                    <a href="allbooks.html" class="nav-item">My Books</a>
                    <a href="readingrecord.html" class="nav-item">Progress</a>
                    <a href="addnewbook.html" class="nav-item active">Notes</a>
                    <a href="stats.html" class="nav-item">Stats</a>
                </nav>
                <div class="search-shell ms-auto ms-md-0">
                    <input id="search-input" class="search-input" type="search" placeholder="Search books, notes...">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
        </div>
    </header>
    <main class="page-shell">

    <section class="page-section input-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <h2 class="text-center mb-4">Add a New Book</h2>
                    <form id="add-book-form">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" placeholder="Enter book title" required>
                        </div>
                        <div class="mb-3">
                            <label for="author" class="form-label">Author</label>
                            <input type="text" class="form-control" id="author" placeholder="Enter author name" required>
                        </div>
                        <div class="mb-3">
                            <label for="genre" class="form-label">Genre</label>
                            <input type="text" class="form-control" id="genre" placeholder="Enter genre" required>
                        </div>
                        <div class="mb-3">
                            <label for="publication-date" class="form-label">Publication Date</label>
                            <input type="date" class="form-control" id="publication-date" required>
                        </div>
                        <div class="mb-3">
                            <label for="page-count" class="form-label">Page Count</label>
                            <input type="number" class="form-control" id="page-count" placeholder="Enter page count" required>
                        </div>

                        <div class="mb-3">
                            <label for="pages-read" class="form-label">Pages Read <span class="text-muted">(Optional)</span></label>
                            <input type="number" class="form-control" id="pages-read" placeholder="Pages read so far">
                        </div>
                        <div class="mb-3">
                            <label for="book-notes" class="form-label">Notes (optional)</label>
                            <textarea class="form-control" id="book-notes" rows="3" placeholder="Write notes here..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="notes-file" class="form-label">Upload Notes File (optional - PDF/DOC)</label>
                            <input type="file" class="form-control" id="notes-file" accept=".pdf,.doc,.docx">
                        </div>                                                                                   
                        <button type="submit" class="btn btn-primary w-100">Add Book</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section class="page-section book-list-section">
        <div class="container-fluid">
            <div class="page-heading">
                <h1>Your Books</h1>
                <p class="section-description">Manage and update your collection, view reading progress, and open notes for each title.</p>
            </div>
            <div class="row" id="book-list">
                <!-- Books will be dynamically added here -->
            </div>
        </div>
    </section>


    </main>

    <!-- Book Detail Modal with Notes Section -->
    <div class="modal fade" id="bookDetailModal" tabindex="-1" aria-labelledby="bookDetailLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="bookDetailLabel">Book Details & Notes</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Book Information -->
                    <div id="bookInfo" class="mb-4">
                        <h6 id="detailTitle" class="fw-bold"></h6>
                        <p id="detailAuthor" class="text-muted mb-2"></p>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <small><strong>Genre:</strong> <span id="detailGenre"></span></small><br>
                                <small><strong>Published:</strong> <span id="detailDate"></span></small>
                            </div>
                            <div class="col-md-6">
                                <small><strong>Pages:</strong> <span id="detailPages"></span></small><br>
                                <small><strong>Progress:</strong> <span id="detailProgress"></span></small>
                            </div>
                        </div>
                        <hr>
                    </div>

                    <!-- Notes Section -->
                    <div class="notes-section">
                        <h6 class="mb-3">📝 Notes for This Book</h6>
                        <div class="mb-3">
                            <textarea id="notesInput" class="form-control" rows="6" placeholder="Add your personal notes, thoughts, and highlights here..."></textarea>
                        </div>
                        <div class="d-flex gap-2 flex-wrap mb-3">
                            <button type="button" class="btn btn-sm btn-success" id="saveNotesBtn">Save Notes</button>
                            <button type="button" class="btn btn-sm btn-info" id="exportTextBtn">Export as TXT</button>
                            <button type="button" class="btn btn-sm btn-warning" id="exportPdfBtn">Export as PDF</button>
                            <button type="button" class="btn btn-sm btn-secondary" id="clearNotesBtn">Clear Notes</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" id="deleteBookBtn">Delete Book</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    crossorigin="anonymous"></script>
    <script src="./js/main.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
    <!-- jsPDF library for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- jsPDF for basic PDF creation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./js/notes-manager.js"></script>
    <script src="./js/addnewbook.js"></script>
    <script src="./js/main.js"></script>
    </body>
    
</html>
